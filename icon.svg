<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Table background -->
  <rect x="16" y="24" width="96" height="92" rx="4" fill="white"/>

  <!-- Header row -->
  <rect x="17" y="25" width="94" height="22" fill="#D0D0D0"/>

  <!-- Highlighted middle column -->
  <rect x="49" y="25" width="30" height="90" fill="#4CAF50" opacity="0.5"/>

  <!-- Table outline -->
  <rect x="16" y="24" width="96" height="92" rx="4" fill="none" stroke="black" stroke-width="3"/>

  <!-- Row separators -->
  <line x1="16" y1="48" x2="112" y2="48" stroke="black" stroke-width="2"/>
  <line x1="16" y1="70" x2="112" y2="70" stroke="black" stroke-width="2"/>
  <line x1="16" y1="92" x2="112" y2="92" stroke="black" stroke-width="2"/>

  <!-- Column separators -->
  <line x1="48" y1="24" x2="48" y2="116" stroke="black" stroke-width="2"/>
  <line x1="80" y1="24" x2="80" y2="116" stroke="black" stroke-width="2"/>
</svg>
